<html lang="en">
<head>
    <title>Color Matching</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <script src="app.js" type="module"></script>
</head>
<body>
<div id="main" class="mt-5">
    <div id="seach-options" class="mx-auto col-md-6 col-lg-6 col-sm-12">
        <label for="search-type">Search Type</label>
        <select id="search-type">
            <option value="name">Color Name</option>
            <option value="colorCode">Color Code</option>
            <option value="hex">HEX</option>
            <option value="rgb">RGB</option>
            <option value="cmyk">CMYK</option>
        </select>
        <label for="search-term">Search</label><input id="search-term" type="text"/>
        <input id="search-btn" type="button" value="Search">
    </div>
    <div id="results-container" class="container mt-5">
        <div id="results" class="row">

        </div>
    </div>
</div>
</body>
</html>
